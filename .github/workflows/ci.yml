# Push / PR: backend tests + Flutter analyze/test + Android APKs (debug + release).
# APKs use --split-per-abi (arm64-v8a, armeabi-v7a, x86_64) to avoid one fat universal APK.
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: README & docs probe (requires ripgrep)
        run: |
          sudo apt-get update -qq && sudo apt-get install -qq -y ripgrep
          bash scripts/verify-readme-docs.sh

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install backend (dev extras)
        working-directory: backend
        run: pip install -e ".[dev]"

      - name: Ruff
        working-directory: backend
        run: python -m ruff check .

      - name: Pytest
        working-directory: backend
        run: python -m pytest tests/ -q

  flutter:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Flutter pub get
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      # Per-ABI APKs only (no universal fat APK). Debug: faster, larger per DEX rules.
      - name: Build Android APKs (debug, split-per-abi)
        run: flutter build apk --debug --split-per-abi

      # Release: R8 shrink in Gradle + Dart obfuscation; symbols kept out of APK.
      - name: Build Android APKs (release, split-per-abi)
        run: |
          flutter build apk --release --split-per-abi \
            --obfuscate \
            --split-debug-info=build/debug-info

      - name: Remove non-installable outputs (keep *-apk only)
        working-directory: app
        run: |
          find build -type f -name 'app-*-debug.apk' -o -name 'app-*-release.apk' | sort
          du -sh build/app/outputs/flutter-apk/* || true

      - uses: actions/upload-artifact@v4
        with:
          name: trendpulse-android-debug-split-apks
          path: app/build/app/outputs/flutter-apk/*debug.apk
          if-no-files-found: error

      - uses: actions/upload-artifact@v4
        with:
          name: trendpulse-android-release-split-apks
          path: app/build/app/outputs/flutter-apk/*release.apk
          if-no-files-found: error
