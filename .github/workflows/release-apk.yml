# GitHub Releases：只上传 **release** 分包 APK（对外分发用）。
# **debug** 包仍在每次 CI（ci.yml）的 Artifacts 里，避免 Releases 重复堆叠、体积与认知成本。
#
# 推荐触发：打并推送语义化标签
#   git tag v1.0.0 && git push origin v1.0.0
# 补救：Actions → Release APKs → Run workflow（无本地 git 时）
name: Release APKs

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "版本标签（如 v1.0.0）；基于运行 workflow 时的默认分支提交"
        required: true
        default: "v1.0.0"

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - name: Resolve release tag
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test

      - name: Build release APKs (split-per-abi)
        run: |
          flutter build apk --release --split-per-abi \
            --obfuscate \
            --split-debug-info=build/debug-info

      - name: List APK outputs
        run: ls -la build/app/outputs/flutter-apk/

      - name: Publish GitHub Release with release APKs
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: TrendPulse ${{ steps.meta.outputs.tag }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          body: |
            **安装包**：本页仅附带 **release** 按 CPU 分包 APK（真机选 **arm64-v8a**）。

            **调试包**：每次合并/推送后的 **CI** workflow → **Artifacts** → `trendpulse-android-debug-split-apks`。

          files: |
            app/build/app/outputs/flutter-apk/app-*-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
