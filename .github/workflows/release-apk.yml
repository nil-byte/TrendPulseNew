# Creates a GitHub **Release** (Releases 页) when you push a version tag, and attaches
# per-ABI release APKs. Ordinary CI only uploads **Artifacts** on each run — they are
# not the same as Releases.
name: Release APKs

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test

      - name: Build release APKs (split-per-abi)
        run: |
          flutter build apk --release --split-per-abi \
            --obfuscate \
            --split-debug-info=build/debug-info

      - name: Publish GitHub Release with APKs
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: TrendPulse ${{ github.ref_name }}
          body: |
            自动构建的 **release** 分包 APK（`--split-per-abi`）。真机安装一般选 **arm64-v8a**；
            模拟器 x86_64 选 **x86_64**。符号表未随 APK 分发（见构建 obfuscate / split-debug-info）。
          files: |
            app/build/app/outputs/flutter-apk/app-*-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
